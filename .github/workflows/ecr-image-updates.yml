name: ECR Image Updates

on:
  pull_request:
    branches: [main]
  schedule:
     - cron: '0 9 * * 5' #Run weekly on Fridays at 9 AM UTC

jobs:
  # Empty check for pull requests - always passes
  pr_check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: PR Check Placeholder
        run: |
          echo "ECR check placeholder for PR - always passes"
          echo "Scheduled ECR checks will run separately"

  # Main ECR check job - only runs on schedule and for private/internal repos
  check_ecr_images:
    if: github.event_name == 'schedule' && (github.repository_visibility == 'private' || github.repository_visibility == 'internal')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write  # Required for AWS OIDC
    steps:
      - name: Check out target repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main
          fetch-depth: 0

      - name: Check out workflow tooling repository
        uses: actions/checkout@v4
        with:
          repository: devrev/global-gh-tools
          ref: chore/ISS-266757/adding-python-and-workflow-for-ecr-global-check
          path: .global-checks-tooling

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install boto3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ECR_CHECK_ROLE_ARN }}
          role-session-name: github-actions-ecr-check
          aws-region: us-east-1

      - name: Check ECR images
        id: check_images
        run: |
          echo "Checking ECR images in repository: ${{ github.repository }}"
          cd ${{ github.workspace }}

          # Capture the output and extract JSON data
          output=$(python .global-checks-tooling/checks/check_ecr_images.py)
          echo "$output"

          # Extract JSON data between markers and save to temp file
          echo "$output" | sed -n '/--- ECR_UPDATES_DATA_START ---/,/--- ECR_UPDATES_DATA_END ---/p' | sed '1d;$d' > ecr_data.json

      - name: Create PR if updates needed
        if: steps.check_images.outputs.updates_needed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Run PR creation script with JSON data as stdin
          cd ${{ github.workspace }}
          cat ecr_data.json | python .global-checks-tooling/checks/create_ecr_pr.py

      - name: Summary
        run: |
          if [ -f ecr_data.json ]; then
            echo "ECR Image Check Summary:"
            echo "======================="

            updates_count=$(python -c "import json; data=json.load(open('ecr_data.json')); print(len(data.get('updates', [])))")
            echo "Updates needed: $updates_count"

            if [ "$updates_count" -gt "0" ]; then
              if [ "${{ github.event.inputs.dry_run }}" == "true" ]; then
                echo "Dry run mode - no PR was created"
              else
                echo "PR created with ECR image updates"
              fi
            else
              echo "No ECR image updates needed"
            fi

            # Clean up temp file
            rm -f ecr_data.json
          else
            echo "No ECR updates data generated"
          fi