name: global checks

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]

jobs:
  global_checks:
    runs-on: ubuntu-latest
    steps:
      - name: Check out target repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check out workflow tooling repository
        uses: actions/checkout@v4
        with:
          repository: devrev/global-gh-tools
          path: .global-checks-tooling
      - name: Load python requirements.
        run: |
          pip install strictyaml
      - name: Run patching block check
        run: |
          git fetch origin ${{ github.base_ref }}
          git diff --name-only \
            origin/${{ github.base_ref }}...HEAD > \
            .global-checks-tooling/changed_files.txt
          cat .global-checks-tooling/changed_files.txt
          python \
            .global-checks-tooling/checks/check_patch_block.py \
            .global-checks-tooling/data/repo_to_vulns.json \
            .global-checks-tooling/changed_files.txt \
            ${{ github.repository }}
